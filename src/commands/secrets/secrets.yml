name: secrets
help: Manage encrypted secret paths
examples:
  - lct secrets add ~/.claude.json
  - lct secrets remove ~/.claude.json
  - lct secrets list
commands:
  - name: add
    help: Add PATH to the secrets list (stored encrypted in gather)
    completions:
      - <file>
    args:
      - name: path
        help: File or directory path to add as a secret (must resolve inside HOME)
        required: true
  - name: remove
    help: Remove PATH from the secrets list
    completions:
      - $(lct secrets list 2>/dev/null)
    args:
      - name: path
        help: File or directory path to remove from secrets
        required: true
  - name: list
    help: List configured secret paths
