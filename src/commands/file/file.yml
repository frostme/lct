name: file
help: Manage tracked file paths
examples:
  - lct file list
  - lct file add ~/.zshrc
  - lct file add ~/.config/alacritty
  - lct file add ~/work/custom.conf
  - lct file remove ~/work/custom.conf
commands:
  - name: add
    help: Add FILE to the correct list (configs, dotfiles, or other)
    completions:
      - <file>
    args:
      - name: file
        help: File path to add (absolute, ~/..., or relative to current directory)
        required: true
  - name: remove
    help: Remove FILE from the correct list (configs, dotfiles, or other)
    completions:
      - $(lct file list 2>/dev/null)
    args:
      - name: file
        help: File path to remove (absolute, ~/..., or relative to current directory)
        required: true
  - name: list
    help: List configured files (configs, dotfiles, and other)
