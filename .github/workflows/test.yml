name: Tests
on:
  workflow_call:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Smoke Tests

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Mise Dependencies
        uses: jdx/mise-action@v3
      - name: Build LCT
        run: mise run b
      - name: Run Smoke Tests
        run: mise run t
        shell: bash
