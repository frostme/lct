name: Release

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: Type of release
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - isolated
      isolatedVersion:
        description: Version number of isolated release
        type: string
        required: false
        default: ""

jobs:
  test:
    uses: ./.github/workflows/test.yml
  release:
    needs: test
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Install Mise Dependencies
        uses: jdx/mise-action@v3
      - name: Get Date
        id: get-date
        run: |
          echo "date=$(/bin/date -u "+%Y%m%d")" >> $GITHUB_OUTPUT
        shell: bash
      - name: Install Other Dependencies
        run: |
          mise run i
      - name: Resolve release metadata
        id: release_meta
        run: |
          set -euo pipefail
          mise run bu ${{ github.event.inputs.releaseType}} ${{ github.event.inputs.isolatedVersion}}
          version="$(yq '.version' src/bashly.yml)"
          tag="v${version}"
          tag_exists=false
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tag_exists=true
          fi
          release_date="$(date -u +%Y-%m-%d)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=${tag_exists}" >> "$GITHUB_OUTPUT"
          echo "release_date=${release_date}" >> "$GITHUB_OUTPUT"
      - name: Build LCT
        run: mise run b
      - name: Build Docs
        run: mise run d
      - name: Build Pages
        run: mise run p
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./pages" # The directory containing your static files
      - name: Create tag
        if: steps.release_meta.outputs.tag_exists != 'true'
        id: tag_create
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: "${{ secrets.LCT_RELEASE_TOKEN }}"
          CUSTOM_TAG: ${{ steps.release_meta.outputs.tag }}
      - name: Release Changelog Builder
        if: steps.release_meta.outputs.tag_exists != 'true'
        id: changelog_builder
        uses: mikepenz/release-changelog-builder-action@v6.1.1
      - name: Update Repo Changelog
        if: steps.release_meta.outputs.tag_exists != 'true'
        run: |
          set -euo pipefail
          tag="${{ steps.release_meta.outputs.tag }}"
          release_notes="${{ steps.changelog_builder.outputs.changelog }}"
          release_date="${{ steps.release_meta.outputs.release_date }}"

          changelog_file="CHANGELOG.md"
          if [[ -f "$changelog_file" ]]; then
            tmp_changelog="${changelog_file}.tmp"
            {
              head -n 1 "$changelog_file"
              echo
              echo "## ${tag} - ${release_date}"
              echo "$release_notes"
              echo
              tail -n +2 "$changelog_file"
            } >"$tmp_changelog"
            mv "$tmp_changelog" "$changelog_file"
          fi
      - name: Prepare release artifacts
        if: steps.release_meta.outputs.tag_exists != 'true'
        run: |
          set -euo pipefail
          build_path="target/build/lct"
          version="${{ steps.release_meta.outputs.version }}"

          zip_asset="lct-${version}.zip"
          tar_asset="lct-${version}.tar.gz"
          checksums_asset="checksums.txt"
          rm -f "$zip_asset" "$tar_asset"

          zip -j "$zip_asset" "$build_path"
          tar -czf "$tar_asset" -C "$(dirname "$build_path")" "$(basename "$build_path")"

          sha256sum "$zip_asset" "$tar_asset" >"$checksums_asset"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5
        if: steps.release_meta.outputs.tag_exists != 'true'
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          body: ${{ steps.changelog_builder.outputs.changelog }}
          files: |
            lct-*.zip
            lct-*.tar.gz
            checksums.txt

      - name: Move Release Assets
        run: |
          release_dir="target/release"
          version="${{ steps.release_meta.outputs.version }}"
          zip_asset="lct-${version}.zip"
          zip_release_asset="${release_dir}/${zip_asset}"
          tar_asset="lct-${version}.tar.gz"
          tar_release_asset="${release_dir}/${tar_asset}"
          checksums_asset="checksums.txt"
          checksums_release_asset="${release_dir}/${checksums_asset}"
          mkdir -p "$release_dir"
          mv "$zip_asset" "$zip_release_asset"
          mv "$tar_asset" "$tar_release_asset"
          mv "$checksums_asset" "$checksums_release_asset"

      - name: Create Release PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: "${{ secrets.LCT_RELEASE_TOKEN }}"
          commit-message: "Release ${{ steps.release_meta.outputs.tag }}"
          title: "Release ${{ steps.release_meta.outputs.tag }}"
          body: |
            This PR prepares the release of version ${{ steps.release_meta.outputs.tag }}.
          branch: release/${{ steps.release_meta.outputs.tag }}
          labels: release, automerge
      - name: Merge Release PR
        uses: "pascalgn/automerge-action@v0.16.4"
        env:
          GITHUB_TOKEN: "${{ secrets.LCT_RELEASE_TOKEN }}"
          PULL_REQUEST: ${{ steps.cpr.outputs.pull-request-number }}
          MERGE_METHOD: squash
          MERGE_RETRIES: 10
          MERGE_RETRY_SLEEP: 10000
  deploy:
    needs: release
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
