$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://example.com/lct-config.schema.yaml"
title: LCT configuration schema
description: >-
  Schema for ~/.config/lct/config.yaml consumed by the lct CLI.
type: object
additionalProperties: false
properties:
  remote:
    type:
      - string
      - "null"
    description: >-
      Git remote URL for the gathered configuration repository. Set to null
      when no remote is configured.
    examples:
      - git@github.com:example/dotfiles.git
      - null
  configs:
    type: array
    description: List of config names managed by lct.
    items:
      type: string
    default: []
    examples:
      - - alacritty
        - nvim
  dotfiles:
    type: array
    description: List of dotfiles managed by lct.
    items:
      type: string
    default: []
    examples:
      - - ~/.zshrc
        - ~/.gitconfig
  other:
    type: array
    description: List of additional files managed by lct.
    items:
      type: string
    default: []
    examples:
      - - ~/work/custom.conf
        - ~/.local/bin/dev-tool
  secrets:
    type: array
    description: List of secret files or directories to encrypt during gather.
    items:
      type: string
    default: []
    examples:
      - - ~/.claude.json
        - ~/.ssh/id_rsa
  plugins:
    type: array
    description: List of lct plugins to install or load.
    items:
      type: string
    default: []
    examples:
      - - gh/owner/example-plugin
  modules:
    type: array
    description: List of module repositories managed by lct.
    items:
      type: string
    default: []
    examples:
      - - github.com/example/lct-module
  projects:
    type: array
    description: List of code projects to clone during bootstrap (OWNER/REPO format).
    items:
      type: string
    default: []
    examples:
      - - frostme/lct
        - frostme/hmgmt-vibe
  packageManager:
    type: string
    description: >-
      Optional package manager used by install flows (for example, mise).
    examples:
      - mise
required:
  - remote
  - configs
  - dotfiles
  - other
  - secrets
  - plugins
  - modules
examples:
  - remote: null
    configs: []
    dotfiles: []
    other: []
    secrets: []
    plugins: []
    modules: []
    projects: []
  - remote: git@github.com:example/dotfiles.git
    configs:
      - alacritty
      - nvim
    dotfiles:
      - ~/.zshrc
      - ~/.gitconfig
    other:
      - ~/work/custom.conf
      - ~/.local/bin/dev-tool
    secrets:
      - ~/.claude.json
      - ~/.ssh/id_rsa
    plugins:
      - gh/owner/example-plugin
      - gh/owner/another-plugin
    modules:
      - github.com/example/lct-module
      - github.com/example/lct-theme
    projects:
      - frostme/lct
      - frostme/hmgmt-vibe
    packageManager: mise
